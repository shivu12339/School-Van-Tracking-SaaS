name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: schoolvan_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
    env:
      NODE_ENV: test
      PROCESS_ROLE: all
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schoolvan_test?schema=public
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/schoolvan_test?schema=public
      REDIS_URL: redis://localhost:6379
      API_PORT: 4000
      CORS_ORIGINS: http://localhost:3000
      JWT_ACCESS_SECRET: ci_access_secret_minimum_32_characters
      JWT_REFRESH_SECRET: ci_refresh_secret_minimum_32_characters
      JWT_ACCESS_TTL: 900s
      JWT_REFRESH_TTL: 30d
      FCM_PROJECT_ID: test
      FCM_CLIENT_EMAIL: test@example.com
      FCM_PRIVATE_KEY: test
      GOOGLE_MAPS_API_KEY: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: services/api/package.json
      - name: Install API dependencies
        run: pnpm install
      - name: Generate Prisma client
        run: pnpm prisma generate
      - name: Apply migrations
        run: pnpm prisma migrate deploy
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm check-types
      - name: Test
        run: pnpm test

  web:
    name: Web — lint & build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api/v1
      NEXT_PUBLIC_WS_BASE_URL: http://localhost:4000
      API_INTERNAL_URL: http://localhost:4000/api/v1
      JWT_ACCESS_SECRET: ci_access_secret_minimum_32_characters
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: replace
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @schoolvan/web lint
      - run: pnpm --filter @schoolvan/web check-types
      - run: pnpm --filter @schoolvan/web test
      - run: pnpm --filter @schoolvan/web build

  flutter:
    name: Flutter — analyze (optional)
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        app: [driver, parent]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
        working-directory: apps/${{ matrix.app }}
      - run: flutter analyze
        working-directory: apps/${{ matrix.app }}
      - run: flutter test
        working-directory: apps/${{ matrix.app }}

  docker-api:
    name: Docker — API + Worker images
    runs-on: ubuntu-latest
    needs: [api]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/Dockerfile
          push: false
          tags: schoolvan-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/Dockerfile.worker
          push: false
          tags: schoolvan-worker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
