name: Deploy API (Railway)

on:
  push:
    branches: [main]
    paths:
      - 'services/api/**'
      - 'infrastructure/docker/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:
    inputs:
      skip_migrate:
        description: 'Skip Prisma migrate'
        required: false
        default: 'false'

concurrency:
  group: production-api
  cancel-in-progress: false

jobs:
  migrate:
    name: Prisma migrate (production)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event.inputs.skip_migrate != 'true'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Migrate deploy (Supabase direct)
        env:
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm --filter @schoolvan/api prisma:deploy

  docker-build:
    name: Verify Docker images
    runs-on: ubuntu-latest
    needs: [migrate]
    if: always() && (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/Dockerfile
          push: false
          tags: schoolvan-api:production
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/Dockerfile.worker
          push: false
          tags: schoolvan-worker:production
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Railway redeploy
    runs-on: ubuntu-latest
    needs: [docker-build]
    environment: production
    steps:
      - name: Redeploy API service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SERVICE_ID: ${{ secrets.RAILWAY_API_SERVICE_ID }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$SERVICE_ID" ]; then
            echo "::notice::Configure RAILWAY_TOKEN + RAILWAY_API_SERVICE_ID or use Railway GitHub integration"
            exit 0
          fi
          curl -fsSL -X POST \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceRedeploy(serviceId: \\\"$SERVICE_ID\\\") }\"}" \
            https://backboard.railway.app/graphql/v2

      - name: Redeploy Worker service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SERVICE_ID: ${{ secrets.RAILWAY_WORKER_SERVICE_ID }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$SERVICE_ID" ]; then
            echo "::notice::Configure RAILWAY_WORKER_SERVICE_ID"
            exit 0
          fi
          curl -fsSL -X POST \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceRedeploy(serviceId: \\\"$SERVICE_ID\\\") }\"}" \
            https://backboard.railway.app/graphql/v2

  smoke:
    name: Production smoke test
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - uses: actions/checkout@v4
      - name: Health + readiness
        env:
          API_URL: ${{ secrets.PRODUCTION_API_URL }}
        run: |
          if [ -z "$API_URL" ]; then echo "Set PRODUCTION_API_URL"; exit 0; fi
          bash infrastructure/scripts/health-check.sh
          bash infrastructure/scripts/smoke-test.sh
