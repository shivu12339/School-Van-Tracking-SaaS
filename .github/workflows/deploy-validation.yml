name: Deploy Validation

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  env-templates:
    name: Production env templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate required keys in .env.production.example
        run: node infrastructure/scripts/validate-production-env.mjs

  docker-production:
    name: Docker production images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: services/api
          file: services/api/Dockerfile
          push: false
          tags: schoolvan-api:validate
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build Worker image
        uses: docker/build-push-action@v6
        with:
          context: services/api
          file: services/api/Dockerfile.worker
          push: false
          tags: schoolvan-worker:validate
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Verify dist shims exist in API image
        run: |
          docker create --name sv-api schoolvan-api:validate
          docker cp sv-api:/app/dist/main.js /tmp/main.js
          docker cp sv-api:/app/dist/worker.main.js /tmp/worker.main.js
          test -s /tmp/main.js
          test -s /tmp/worker.main.js
          docker rm sv-api

  web-production-build:
    name: Next.js production build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_BASE_URL: https://example.up.railway.app/api/v1
      NEXT_PUBLIC_WS_BASE_URL: https://example.up.railway.app
      API_INTERNAL_URL: https://example.up.railway.app/api/v1
      JWT_ACCESS_SECRET: ci_access_secret_minimum_32_characters
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: replace
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @schoolvan/web build
