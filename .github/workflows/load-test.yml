name: Load Test (Staging)

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

jobs:
  k6-smoke:
    name: k6 API health smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: grafana/k6-action@v0.3.1
        with:
          filename: tests/load/k6/api-health.js
        env:
          API_URL: ${{ secrets.STAGING_API_URL || 'http://localhost:4000' }}
