# Reference stack for local parity with MVP providers (not used in production deploy).
# Production: Supabase + Upstash + Railway + Vercel

services:
  api:
    build:
      context: ../../services/api
      dockerfile: ../../infrastructure/docker/api.Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - ../../.env
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ../../services/api
      dockerfile: ../../infrastructure/docker/worker.Dockerfile
    env_file:
      - ../../.env
    depends_on:
      - redis

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: schoolvan
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
