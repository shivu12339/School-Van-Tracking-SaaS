# Reference reverse proxy for AWS ALB / EC2 / future self-hosted.
# MVP uses Railway + Vercel TLS termination directly.

upstream schoolvan_api {
    least_conn;
    server api:4000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl http2;
    server_name api.yourdomain.com;

    # ssl_certificate     /etc/ssl/certs/api.crt;
    # ssl_certificate_key /etc/ssl/private/api.key;

    client_max_body_size 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    location /api/ {
        proxy_pass http://schoolvan_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
    }

    # Socket.IO — sticky sessions recommended until fully on Redis adapter
    location /socket.io/ {
        proxy_pass http://schoolvan_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /api/v1/health {
        proxy_pass http://schoolvan_api;
        access_log off;
    }
}
