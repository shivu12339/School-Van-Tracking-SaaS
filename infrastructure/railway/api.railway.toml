# Railway — API service
# Dashboard: Root Directory = services/api, Dockerfile = Dockerfile

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/v1/health/ready"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1

# Enable WebSockets in Railway service settings (Networking → WebSockets)
