# Worker service — set Railway rootDirectory to repo root (empty)
# and dockerfilePath to services/api/Dockerfile.worker.

[build]
builder = "DOCKERFILE"
dockerfilePath = "services/api/Dockerfile.worker"

[deploy]
healthcheckPath = "/api/v1/health/ready"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
