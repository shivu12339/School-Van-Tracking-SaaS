packages:
  - 'apps/*'
  - 'services/*'
  - 'packages/*'

allowBuilds:
  '@firebase/util': true
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': true
  '@sentry/cli': true
  argon2: true
  bcrypt: true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  protobufjs: true
  sharp: true
  unrs-resolver: true


catalog:
  typescript: ^5.8.3
  eslint: ^9.26.0
  prettier: ^3.5.3
