# Railway API service — set rootDirectory to repo root (empty) so the
# Docker build context includes packages/* needed by the pnpm workspace.

[build]
builder = "DOCKERFILE"
dockerfilePath = "services/api/Dockerfile"

[deploy]
healthcheckPath = "/api/v1/health/ready"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
